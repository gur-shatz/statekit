title: httpcheckdemo
description: Interactive demo for HTTPMetrics-backed state checks.

watch:
  - "*.go"
  - "*.html"
  - "../../*.go"
  - "../../collectors/*.go"
  - "../../scraper/*.go"
  - "../../go.mod"
  - "../../go.sum"

build:
  - go build -o ./bin/httpcheckdemo .

exec:
  - ./bin/httpcheckdemo

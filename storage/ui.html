<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>statekit storage</title>
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline@8.5.1/styles/vis-timeline-graph2d.min.css">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Fleet State</h1>
        <div class="meta" id="lastRefresh">Loading...</div>
      </div>
      <div class="actions">
        <select id="projectionMode" aria-label="Projection mode">
          <option value="server">server projection</option>
          <option value="browser">browser derived</option>
        </select>
        <select id="statusFilter" aria-label="Status filter">
          <option value="">all targets</option>
          <option value="issues">with issues</option>
          <option value="down">down</option>
          <option value="fail">fail</option>
          <option value="warn">warn</option>
          <option value="pass">ok</option>
        </select>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <section class="summary" id="totals"></section>

    <section class="pane systemTimelinePane">
      <div class="paneHeader">
        <h2>System Timeline</h2>
        <div class="paneControls">
          <span class="meta">warnings, failures, and down transitions</span>
          <select id="timelineWindow" aria-label="Timeline window">
            <option value="1800000">30 minutes</option>
            <option value="3600000">1 hour</option>
            <option value="7200000">2 hours</option>
            <option value="86400000">24 hours</option>
          </select>
        </div>
      </div>
      <div class="systemTimelineViz" id="systemTimelineViz"></div>
    </section>

    <section class="pane incidentsPane">
      <div class="paneHeader">
        <h2 id="incidentsTitle">Incidents</h2>
        <div class="paneControls">
          <span class="meta">component escalations and fleet ops</span>
          <select id="incidentFilter" aria-label="Incident filter">
            <option value="active">active</option>
            <option value="">all</option>
            <option value="open">open</option>
            <option value="closed">closed</option>
            <option value="acknowledged">acknowledged</option>
            <option value="global">fleet ops</option>
          </select>
        </div>
      </div>
      <div class="incidentTable" id="incidents"></div>
    </section>

    <section class="workspace">
      <div class="pane">
        <div class="paneHeader">
          <h2>Targets</h2>
          <span class="meta">issues inline</span>
        </div>
        <div class="targetTable" id="targets"></div>
      </div>

      <div class="pane">
        <div class="paneHeader">
          <h2 id="statesTitle">States</h2>
          <span class="meta">current state list</span>
        </div>
        <div class="stateTable" id="states"></div>
      </div>

      <div class="pane">
        <div class="paneHeader">
          <h2 id="timelineTitle">Timeline</h2>
          <span class="meta">latest transitions</span>
        </div>
        <div class="eventTable" id="events"></div>
      </div>
    </section>
  </main>
  <script>
    window.STATEKIT_API_BASE = "{{.APIBase}}";
  </script>
  <script src="https://unpkg.com/vis-timeline@8.5.1/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <script src="ui.js"></script>
</body>
</html>

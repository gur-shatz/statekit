<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>statekit storage</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Fleet State</h1>
        <div class="meta" id="lastRefresh">Loading...</div>
      </div>
      <div class="actions">
        <select id="statusFilter" aria-label="Status filter">
          <option value="">all targets</option>
          <option value="issues">with issues</option>
          <option value="down">down</option>
          <option value="fail">fail</option>
          <option value="warn">warn</option>
          <option value="pass">ok</option>
        </select>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <section class="summary" id="totals"></section>

    <section class="pane systemTimelinePane">
      <div class="paneHeader">
        <h2>System Timeline</h2>
        <div class="paneControls">
          <span class="meta">triggering states over time</span>
          <select id="timelineWindow" aria-label="Timeline window">
            <option value="1800000">30 minutes</option>
            <option value="3600000">1 hour</option>
            <option value="7200000">2 hours</option>
            <option value="86400000">24 hours</option>
          </select>
        </div>
      </div>
      <div class="fleetChart" id="fleetChart"></div>
    </section>

    <section class="pane incidentsPane">
      <div class="paneHeader">
        <h2 id="incidentsTitle">Incidents</h2>
        <div class="paneControls">
          <span class="meta">component escalations and fleet ops</span>
          <select id="incidentFilter" aria-label="Incident filter">
            <option value="active">active</option>
            <option value="">all</option>
            <option value="open">open</option>
            <option value="closed">closed</option>
            <option value="acknowledged">acknowledged</option>
            <option value="global">fleet ops</option>
          </select>
        </div>
      </div>
      <div class="incidentTable" id="incidents"></div>
    </section>

    <section class="workspace">
      <div class="pane">
        <div class="paneHeader">
          <h2>Targets</h2>
          <span class="meta">issues inline</span>
        </div>
        <div class="targetTable" id="targets"></div>
      </div>

      <div class="pane">
        <div class="paneHeader">
          <h2 id="statesTitle">States</h2>
          <span class="meta">click a state for full YAML</span>
        </div>
        <div class="stateTable" id="states"></div>
      </div>

      <div class="pane">
        <div class="paneHeader">
          <h2 id="timelineTitle">Timeline</h2>
          <span class="meta">latest transitions</span>
        </div>
        <div class="eventTable" id="events"></div>
      </div>
    </section>
  </main>

  <div class="drawer" id="stateDrawer" aria-hidden="true">
    <div class="drawerBackdrop" id="stateDrawerBackdrop"></div>
    <aside class="drawerPanel" role="dialog" aria-modal="true" aria-labelledby="stateDrawerTitle">
      <div class="drawerHeader">
        <div class="drawerHeading">
          <h2 id="stateDrawerTitle">State</h2>
          <div class="subtle truncate" id="stateDrawerSub"></div>
        </div>
        <div class="drawerActions">
          <button type="button" id="stateDrawerCopy">Copy</button>
          <button type="button" id="stateDrawerClose" aria-label="Close drawer">Close</button>
        </div>
      </div>
      <div class="drawerBody">
        <section class="drawerSection">
          <div class="drawerSectionTitle">Observation</div>
          <pre class="drawerYaml" id="stateDrawerObservation"></pre>
        </section>
        <details class="drawerMeta" id="stateDrawerMeta">
          <summary>Metadata</summary>
          <pre class="drawerYaml" id="stateDrawerMetadata"></pre>
        </details>
      </div>
    </aside>
  </div>

  <script>
    window.STATEKIT_API_BASE = "{{.APIBase}}";
  </script>
  <script src="ui.js"></script>
</body>
</html>

title: stackdemo
description: Three-layer statekit fleet (leaves, scrapers, fleet aggregator) in one process.

vars:
  ADDR: '{{ env "ADDR" | default ":19110" }}'
  FLAGS: '{{ env "FLAGS" | default "-kill-url" }}'

watch:
  - "*.go"
  - "*.html"
  - "config/*.yaml"
  - "config/*.yml"
  - "../../*.go"
  - "../../scraper/*.go"
  - "../../storage/*.go"
  - "../../console/*.go"
  - "../../console/*.js"
  - "../../console/*.css"
  - "../../console/*.html"
  - "../../go.mod"
  - "../../go.sum"
  - "../../*.js"
  - "../../*.html"

build:
  - go build -o ./bin/stackdemo .

exec:
  - ./bin/stackdemo -addr={{ .ADDR }} -config-dir=config {{ .FLAGS }}
